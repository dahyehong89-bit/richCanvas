<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💸 가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e3f;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Nav */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .nav-logo { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 18px; color: var(--accent2); text-decoration: none; }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { color: var(--muted); text-decoration: none; padding: 8px 14px; border-radius: 10px; font-size: 14px; font-weight: 500; transition: all .2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }

  /* Main */
  main { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

  /* Summary grid */
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .summary-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .summary-amount { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; }
  .summary-amount.income { color: var(--green); }
  .summary-amount.expense { color: var(--red); }
  .summary-amount.balance { color: var(--accent2); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all .15s; font-family: inherit; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(248,113,113,.3); padding: 6px 12px; font-size: 13px; }
  .btn-danger:hover { background: rgba(248,113,113,.1); }
  .btn-ghost { background: var(--surface2); color: var(--text); }
  .btn-ghost:hover { background: var(--border); }
  .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 24px rgba(124,106,247,.4); transition: all .2s; z-index: 50; }
  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 32px rgba(124,106,247,.6); }

  /* Form */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .form-control { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; font-family: inherit; transition: border-color .15s; }
  .form-control:focus { outline: none; border-color: var(--accent); }
  select.form-control option { background: var(--surface2); }

  /* Type selector */
  .type-select { display: flex; gap: 8px; margin-bottom: 16px; }
  .type-btn { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 15px; font-weight: 600; transition: all .15s; font-family: inherit; }
  .type-btn.active-income { border-color: var(--green); color: var(--green); background: rgba(52,211,153,.1); }
  .type-btn.active-expense { border-color: var(--red); color: var(--red); background: rgba(248,113,113,.1); }

  /* Transaction list */
  .tx-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .tx-item:last-child { border-bottom: none; }
  .tx-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .tx-amount { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 15px; white-space: nowrap; }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }

  /* Progress bar */
  .progress { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-top: 6px; }
  .progress-bar { height: 100%; border-radius: 99px; background: var(--accent); transition: width .5s ease; }
  .progress-bar.over { background: var(--red); }

  /* Month selector */
  .month-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .month-nav select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: inherit; font-size: 14px; cursor: pointer; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-chip { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; text-decoration: none; transition: all .15s; }
  .filter-chip:hover, .filter-chip.active { border-color: var(--accent); color: var(--accent2); background: rgba(124,106,247,.1); }

  /* Cat dots */
  .cat-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* Section header */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .summary-grid .card:last-child { grid-column: span 2; }
    .nav-logo span { display: none; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">💸 <span>가계부</span></a>
    <div class="nav-links">
      <a href="/" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>홈</a>
      <a href="/transactions/" {% if request.resolver_match.url_name == 'transaction_list' %}class="active"{% endif %}>내역</a>
      <a href="/budget/" {% if request.resolver_match.url_name == 'budget' %}class="active"{% endif %}>예산</a>
    </div>
  </div>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
{% block fab %}
<a href="/transactions/add/" class="fab" title="거래 추가">+</a>
{% endblock %}
</body>
</html>
